name: lazy-mount demo

# Proves the core value proposition end-to-end against a genuinely huge public
# repo (microsoft/TypeScript, 80k+ files): a commit through git-lazy-mount with
# no full clone and no working-tree checkout, in well under a second, fetching
# ~no objects. Runs on PRs that touch the clone/commit path, on demand, and
# weekly (to catch remote/protocol drift).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "crates/cli/**"
      - "crates/daemon/**"
      - "crates/git-store/**"
      - "crates/workspace/**"
      - "crates/object-provider/**"
      - "scripts/lazy-commit-demo.sh"
      - ".github/workflows/lazy-mount-demo.yml"
  pull_request:
    paths:
      - "crates/cli/**"
      - "crates/daemon/**"
      - "crates/git-store/**"
      - "crates/workspace/**"
      - "crates/object-provider/**"
      - "scripts/lazy-commit-demo.sh"
      - ".github/workflows/lazy-mount-demo.yml"
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fast-commit-huge-repo:
    name: fast commit on microsoft/TypeScript via lazy mount
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build the lazy-mount CLI
        run: cargo build --release -p glm-cli
      - name: lazy clone + fast commit (no full clone, no checkout)
        run: ./scripts/lazy-commit-demo.sh
        env:
          GLM_DEMO_REPO: https://github.com/microsoft/TypeScript
          GLM_DEMO_BRANCH: main
          # Generous ceilings so a slow runner won't flake; the printed timings
          # are the real story (locally: ~1.2s clone, ~0.1s commit).
          GLM_MAX_CLONE_MS: "90000"
          GLM_MAX_COMMIT_MS: "15000"
