name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Backend-independent core: fmt, clippy, and the full unit/integration suite.
  # Real kernel mounting is exercised by the `linux-mount` job below.
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      # NOT `--all-features`: the `fuse` feature links libfuse3 and needs
      # /dev/fuse, so it is covered by the `linux-mount` job instead.
      - name: clippy
        run: cargo clippy --locked --all-targets -- -D warnings
      - name: test
        run: cargo test --locked --workspace

  # The transparent design's mount, exercised through a REAL /dev/fuse mount on
  # every push (design.md §40.2 requires real-mount CI, not just unit tests).
  # GitHub's ubuntu runners expose /dev/fuse and permit unprivileged FUSE, so this
  # runs automatically — the transparent slice can never regress unnoticed.
  linux-mount:
    name: linux mount (/dev/fuse)
    runs-on: ubuntu-latest
    # A wedged mount must fail fast, not stall the runner for hours.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: install libfuse3
        run: sudo apt-get update && sudo apt-get install -y fuse3 libfuse3-dev
      - name: enable user_allow_other
        run: echo user_allow_other | sudo tee -a /etc/fuse.conf
      - name: clippy (fuse mount + cli)
        run: |
          cargo clippy --locked -p glm-fuse --all-targets --features fuse -- -D warnings
          cargo clippy --locked -p glm-cli --all-targets --features fuse -- -D warnings
      # Real-mount tests run SERIALLY (--test-threads=1): each spawns its own FUSE
      # mount + git subprocesses, and the CLI tests detach / SIGKILL serve daemons.
      # Those contend for /dev/fuse and do not isolate cleanly under the runner's
      # parallel test scheduling (a mount/unmount can wedge), so we serialize them.
      - name: real /dev/fuse mount + transparent git stack + one-command CLI
        run: |
          cargo test --locked -p glm-worktree -p glm-git-repo
          cargo test --locked -p glm-fuse --features fuse -- --test-threads=1
          cargo test --locked -p glm-cli --features fuse -- --test-threads=1

  msrv:
    name: msrv build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked --workspace
