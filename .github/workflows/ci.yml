name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  # Enables the manually-triggered backend-mount jobs below (`linux-mount`,
  # `macos-mount`), which are gated on `github.event_name == 'workflow_dispatch'`.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Backend-independent core: builds and runs the full state model, transaction,
  # and recovery test suite on every platform. Real kernel mounting is NOT
  # exercised here (see the `linux-mount` manual job).
  check:
    name: check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      # NOT `--all-features`: the only feature is `glm-fs-fuse/fuse`, which links
      # libfuse3 and so can't build on macOS/Windows (or a libfuse-less Linux).
      # It is covered by the manual `linux-mount` job instead.
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace

  msrv:
    name: msrv build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace

  # Real FUSE mounting requires libfuse3 and a loopback-capable runner. It is a
  # separate, manually-triggered job: a green `check` matrix does NOT imply the
  # kernel backend was exercised. This builds the `fuse` feature (the libfuse
  # `fuser` adapter) and runs the real loopback-mount test (`--include-ignored`),
  # which mounts the engine and drives it with plain `std::fs` calls. The same
  # flow is reproducible locally in Docker (see docs/platform-linux.md).
  linux-mount:
    name: linux fuse backend (manual)
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: install libfuse3
        run: sudo apt-get update && sudo apt-get install -y fuse3 libfuse3-dev
      - name: clippy (fuse adapter)
        run: cargo clippy -p glm-fs-fuse --all-targets --features fuse -- -D warnings
      - name: real loopback mount + backend logic
        run: cargo test -p glm-fs-fuse --features fuse -- --include-ignored

  # Real FSKit mounting requires a SIGNED, user-APPROVED system extension, which
  # a GitHub-hosted `macos-latest` runner cannot load. So this is a separate,
  # manually-triggered job: a green `check` matrix does NOT imply the macOS
  # backend was exercised (spec §54). On a hosted runner it runs the backend-logic
  # tests plus the on-device harness, which self-skips the real-mount assertions
  # when no FSKit backend is present. To actually validate a real mount, target a
  # SELF-HOSTED Apple host that has the signed extension installed and approved by
  # overriding `runs-on: [self-hosted, macOS]` (see crates/fs-fskit/extension and
  # crates/fs-fskit/tests/on_device.rs). This job gates the umbrella support claim
  # in docs/platform-macos.md (#4); findings are recorded there.
  macos-mount:
    name: macos fskit backend (manual)
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: backend capability probe
        run: cargo run -p glm-cli -- doctor --json
      - name: test fskit backend logic + on-device harness
        run: cargo test -p glm-fs-fskit -- --include-ignored
